<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMB - Centro Médico da Bahia</title>
  <meta name="description"
    content="Agende sua consulta ou exame no CMB - Centro Médico da Bahia. Ortopedia, Cardiologia, Ultrassom e mais. Atendimento rápido e humanizado." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#e6f0fa',
              100: '#cce0f5',
              200: '#99c2eb',
              300: '#66a3e0',
              400: '#3385d6',
              500: '#0055A4', // CMB Blue (Base)
              600: '#004483',
              700: '#003362',
              800: '#002241',
              900: '#001121',
            },
            secondary: {
              50: '#fdecec',
              100: '#fbd9d9',
              200: '#f7b3b3',
              300: '#f38c8c',
              400: '#ef6666',
              500: '#D32F2F', // Medical Red (Cross)
              600: '#a92626',
              700: '#7f1c1c',
              800: '#541313',
              900: '#2a0909',
            },
            gray: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6b7280',
              600: '#4b5563',
              700: '#374151',
            }
          },
          backgroundImage: {
            'gradient-primary': 'linear-gradient(135deg, #0055A4 0%, #004483 100%)',
            'gradient-secondary': 'linear-gradient(135deg, #D32F2F 0%, #a92626 100%)',
            'gradient-hero': 'linear-gradient(to right bottom, #ffffff, #f0f7ff, #e1effe)',
            'pattern-dots': "url(\"data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.05' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E\")",
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'glow': '0 0 15px rgba(59, 130, 246, 0.5)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
